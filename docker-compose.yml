version: "3.9"

services:
  app:
    build: .
    command: ["server"]
    volumes:
      - .:/app
    ports:
      - "${PORT:-5000}:5000"
    environment:
      APP_HOST: ${APP_HOST:-0.0.0.0}
      PORT: ${PORT:-5000}
      FLASK_DEBUG: ${FLASK_DEBUG:-false}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/pirksp}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      APP_ENV: ${APP_ENV:-local}
      APP_VERSION: ${APP_VERSION:-dev}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      SERVICE_NAME: ${SERVICE_NAME:-pirksp}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16
    container_name: pirksp_db
    restart: always
    environment:
      POSTGRES_DB: pirksp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pirksp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pirksp_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
