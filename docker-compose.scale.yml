version: "3.9"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "5000:80"
    depends_on:
      - app1
      - app2
      - app3
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

  app1:
    image: ghcr.io/michail19/pirksp:${IMAGE_TAG:-latest}
    environment:
      APP_HOST: ${APP_HOST:-0.0.0.0}
      PORT: ${PORT:-5000}
      FLASK_DEBUG: ${FLASK_DEBUG:-false}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/pirksp}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      APP_ENV: ${APP_ENV:-local}
      APP_VERSION: ${APP_VERSION:-dev}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      SERVICE_NAME: ${SERVICE_NAME:-pirksp}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10}

  app2:
    image: ghcr.io/michail19/pirksp:${IMAGE_TAG:-latest}
    environment:
      APP_HOST: ${APP_HOST:-0.0.0.0}
      PORT: ${PORT:-5000}
      FLASK_DEBUG: ${FLASK_DEBUG:-false}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/pirksp}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      APP_ENV: ${APP_ENV:-local}
      APP_VERSION: ${APP_VERSION:-dev}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      SERVICE_NAME: ${SERVICE_NAME:-pirksp}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10}

  app3:
    image: ghcr.io/michail19/pirksp:${IMAGE_TAG:-latest}
    environment:
      APP_HOST: ${APP_HOST:-0.0.0.0}
      PORT: ${PORT:-5000}
      FLASK_DEBUG: ${FLASK_DEBUG:-false}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/pirksp}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      APP_ENV: ${APP_ENV:-local}
      APP_VERSION: ${APP_VERSION:-dev}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      SERVICE_NAME: ${SERVICE_NAME:-pirksp}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10}

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: pirksp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

volumes:
  postgres_data:
